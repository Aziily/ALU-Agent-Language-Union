<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}agent-lang benchmark{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    body { padding: 1rem 2rem; }
    .pass-cell { font-variant-numeric: tabular-nums; }
    .pass-100 { background: #d4edda; }
    .pass-80 { background: #e2f0d8; }
    .pass-50 { background: #fff3cd; }
    .pass-0 { background: #f8d7da; }
    pre { background: #f7f7f9; padding: 1rem; border-radius: 4px; max-height: 600px; overflow: auto; white-space: pre-wrap; }
    .meta-strip { font-size: 0.875rem; color: #6c757d; }
    table.matrix th, table.matrix td { text-align: center; vertical-align: middle; padding: 0.4rem 0.6rem; }
    nav.crumb { font-size: 0.875rem; margin-bottom: 1rem; }
    nav.crumb a { color: #495057; }
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body>

<nav class="crumb">
  <a href="{{ url_for('index') }}">⌂ Runs</a>
  {% block breadcrumb %}{% endblock %}
</nav>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
